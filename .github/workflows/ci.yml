name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install sdl2:x64-windows

      - name: Configure
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Smoke test raytracer
        run: ./build/raytracer --width 64 --height 36 --samples 2 --output /tmp/rt.ppm --dump-ppm
        if: runner.os != 'Windows'

      - name: Smoke test raytracer (Windows)
        if: runner.os == 'Windows'
        run: .\build\Release\raytracer.exe --width 64 --height 36 --samples 2 --output rt.ppm --dump-ppm

      - name: Smoke test rasterizer
        run: ./build/rasterizer --dump-ppm --output /tmp/rz.ppm
        if: runner.os != 'Windows'

      - name: Smoke test rasterizer (Windows)
        if: runner.os == 'Windows'
        run: .\build\Release\rasterizer.exe --dump-ppm --output rz.ppm

      - name: Smoke test raycaster
        run: ./build/raycaster --dump-ppm --output /tmp/rc.ppm
        if: runner.os != 'Windows'

      - name: Smoke test raycaster (Windows)
        if: runner.os == 'Windows'
        run: .\build\Release\raycaster.exe --dump-ppm --output rc.ppm
