name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Smoke test raytracer
        run: ./build/raytracer --width 64 --height 36 --samples 2 --output /tmp/rt.ppm --dump-ppm

      - name: Smoke test rasterizer
        run: ./build/rasterizer --dump-ppm --output /tmp/rz.ppm

      - name: Smoke test raycaster
        run: ./build/raycaster --dump-ppm --output /tmp/rc.ppm
